server:
  port: 8081

spring:
  application:
    name: weather-service
  datasource:
    # MySQL 8+ often requires allowPublicKeyRetrieval=true when using caching_sha2_password.
    url: jdbc:mysql://localhost:3306/weather_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: root
    password: Omsairam12345!
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
